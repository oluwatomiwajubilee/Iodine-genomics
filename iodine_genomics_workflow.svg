<text font-size="11" x="810" y="157" text-anchor="middle" fill="#0F6E56">NCBI GenBank / RefSeq</text>

<!-- Entry point labels -->
<text font-size="10" font-style="italic" x="145" y="184" text-anchor="middle" fill="#1D9E75">starts at Phase 2</text>
<text font-size="10" font-style="italic" x="365" y="184" text-anchor="middle" fill="#1D9E75">starts at Phase 4</text>
