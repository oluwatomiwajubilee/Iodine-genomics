<text font-size="11" x="145" y="157" text-anchor="middle" fill="#0F6E56">Raw paired-end reads</text>

<rect x="270" y="120" width="190" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
